<style>
  :root{
    --sidebar:#1B2733; --sidebar-active:#243444; --sidebar-text:#9DAEB8; --sidebar-text-active:#F3EAD8;
    --bg:#F7F4EE; --card:#FFFFFF; --card-border:#E7E1D6; --text:#1F2A33; --muted:#6B655A; --muted2:#8A8478;
    --gold:#B8863B; --input-border:#DDD6C8;
    --green-bg:#E1EEE5; --green-text:#2F6B45; --green-border:#B4D6BF;
    --amber-bg:#F3EAD8; --amber-text:#96682A; --amber-border:#E0C69A;
    --blue-bg:#E3EDF3; --blue-text:#2E5E7A; --blue-border:#B7CEDD;
    --red-bg:#F4E3DF; --red-text:#B4462E; --red-border:#E3B7AB;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);}
  .serif{font-family:Georgia,"Times New Roman",serif;}
  #app{display:none;min-height:100vh;width:100%;}
  #app.visible{display:flex;}

  #login-root{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--sidebar);}
  .login-card{background:#FBF9F6;border-radius:10px;width:100%;max-width:380px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,0.35);}
  .login-brand{text-align:center;margin-bottom:22px;}
  .login-brand .title{font-size:22px;color:var(--text);}
  .login-brand .subtitle{font-size:12px;color:var(--muted2);margin-top:4px;}
  .login-error{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red-border);border-radius:6px;padding:8px 10px;font-size:12px;margin-bottom:12px;}
  .login-note{background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue-border);border-radius:6px;padding:8px 10px;font-size:12px;margin-bottom:12px;}
  .forgot-link{display:block;text-align:center;font-size:12px;color:var(--muted2);margin-top:12px;cursor:pointer;text-decoration:underline;}

  .sidebar{width:224px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-head{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1);}
  .sidebar-head .title{font-size:18px;color:var(--sidebar-text-active);letter-spacing:.3px;}
  .sidebar-head .subtitle{font-size:10px;color:#8FA3AF;margin-top:2px;}
  .nav{flex:1;padding:12px 0;}
  .nav-item{width:100%;display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:var(--sidebar-text);background:none;border:none;text-align:left;cursor:pointer;border-right:2px solid transparent;}
  .nav-item:hover{background:#22303C;color:#D8DEE3;}
  .nav-item.active{background:var(--sidebar-active);color:var(--sidebar-text-active);border-right-color:var(--gold);}
  .nav-badge{background:var(--red-text);color:#fff;font-size:10px;padding:1px 6px;border-radius:999px;margin-left:4px;}
  .sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.1);}
  .user-chip{font-size:12px;color:#D8DEE3;margin-bottom:2px;}
  .user-role{font-size:10px;color:#71828D;margin-bottom:10px;}
  .logout-btn{width:100%;background:none;border:1px solid rgba(255,255,255,0.15);color:var(--sidebar-text);font-size:12px;padding:6px;border-radius:6px;cursor:pointer;}
  .logout-btn:hover{background:rgba(255,255,255,0.06);color:#fff;}

  .main{flex:1;overflow-y:auto;padding:32px;}
  h1.page-title{font-size:26px;margin:0 0 4px 0;}
  .page-sub{font-size:13px;color:var(--muted);margin:0 0 24px 0;}
  .row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}

  .btn-primary{display:inline-flex;align-items:center;gap:6px;background:var(--sidebar);color:var(--sidebar-text-active);font-size:14px;padding:9px 16px;border-radius:6px;border:none;cursor:pointer;}
  .btn-primary:hover{background:var(--sidebar-active);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .link-back{background:none;border:none;font-size:14px;color:var(--muted);cursor:pointer;margin-bottom:16px;padding:0;}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px,1fr));gap:16px;margin-bottom:32px;}
  .card{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:16px;}
  .stat-label{font-size:12px;color:var(--muted2);margin-bottom:4px;}
  .stat-value{font-size:26px;}
  .tone-neutral{color:var(--text);} .tone-amber{color:var(--amber-text);} .tone-red{color:var(--red-text);} .tone-blue{color:var(--blue-text);}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .card h2{font-size:16px;margin:0 0 12px 0;}
  .upcoming-row{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0ECE2;padding:8px 0;}
  .upcoming-row:last-child{border-bottom:none;padding-bottom:0;}
  .upcoming-name{font-size:14px;font-weight:600;}
  .upcoming-meta{font-size:12px;color:var(--muted2);}
  .urgency{font-size:12px;font-weight:600;white-space:nowrap;}
  .u-red{color:var(--red-text);} .u-amber{color:var(--amber-text);} .u-muted{color:#5B6B73;} .u-green{color:var(--green-text);}

  .workload-item{margin-bottom:12px;}
  .workload-top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;}
  .workload-top .count{font-size:12px;color:var(--muted2);}
  .bar-bg{width:100%;height:8px;background:#EFEAE0;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;background:var(--gold);}
  .bar-fill.danger{background:var(--red-text);}

  .search-wrap{position:relative;max-width:320px;margin-bottom:16px;}
  .search-wrap input{padding-left:32px;}
  .search-icon{position:absolute;left:10px;top:9px;color:var(--muted2);font-size:14px;}

  input, select{width:100%;border:1px solid var(--input-border);border-radius:6px;padding:8px 10px;font-size:14px;background:#fff;color:var(--text);}
  input:focus, select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,59,0.15);}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead tr{background:#FBF9F6;text-align:left;font-size:11px;color:var(--muted2);text-transform:uppercase;}
  th, td{padding:12px 16px;}
  tbody tr{border-top:1px solid #F0ECE2;}
  tbody tr.clickable{cursor:pointer;}
  tbody tr.clickable:hover{background:#FBF9F6;}
  .table-wrap{background:var(--card);border:1px solid var(--card-border);border-radius:8px;overflow:hidden;}
  .cell-muted{color:var(--muted);}
  .cell-strong{font-weight:600;}
  .chevron{text-align:right;color:#B0AA9C;}

  .pill{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;border:1px solid;}
  .pill-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
  .pill-select{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid;cursor:pointer;}
  .status-Overdue{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border);}
  .status-In\ Progress{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border);}
  .status-Pending{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border);}
  .status-Filed{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
  .payment-Paid{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
  .payment-Pending{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border);}

  .filter-row{display:flex;gap:12px;margin-bottom:16px;}
  .filter-row select{width:200px;}

  .emp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .emp-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .emp-status-ok{font-size:12px;color:var(--green-text);}
  .emp-status-warn{font-size:12px;color:var(--red-text);}
  .emp-task{font-size:12px;color:var(--muted2);margin-top:4px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal-box{background:#FBF9F6;border-radius:8px;box-shadow:0 20px 40px rgba(0,0,0,0.2);width:100%;max-width:420px;max-height:85vh;overflow-y:auto;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--card-border);}
  .modal-head h3{font-size:17px;margin:0;}
  .modal-close{background:none;border:none;font-size:18px;color:var(--muted2);cursor:pointer;}
  .modal-body{padding:20px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .field-error{color:var(--red-text);font-size:11px;margin-top:4px;}
  .empty-note{padding:24px;text-align:center;color:var(--muted2);}
  .plain-text{font-size:12px;color:var(--muted);}
  .loading-note{padding:40px;text-align:center;color:var(--muted2);}
</style>

<body>

<div id="login-root">
  <div class="login-card">
    <div class="login-brand">
      <div class="title serif">Tax Pro Advisors</div>
      <div class="subtitle">Sign in to continue</div>
    </div>
    <div id="login-error-slot"></div>
    <div class="field"><label>Email</label><input id="login-email" placeholder="you@firm.com" /></div>
    <div class="field"><label>Password</label><input id="login-password" type="password" placeholder="••••••••" /></div>
    <button class="btn-primary" id="login-btn" style="width:100%;justify-content:center;margin-top:6px">Sign in</button>
    <span class="forgot-link" id="forgot-link">Forgot password?</span>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="title serif">Tax Pro Advisors</div>
      <div class="subtitle">Practice management</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot" id="sidebar-foot"></div>
  </div>
  <div class="main" id="main"><div class="loading-note">Loading…</div></div>
</div>
<div id="modal-root"></div>

<script>
// ==================== Constants ====================
const filingTypes = ["GST Return (GSTR-3B)","GST Return (GSTR-1)","TDS Return (24Q)","TDS Return (26Q)","Income Tax Return","ROC Annual Filing"];
const clientTypes = ["Individual","Proprietorship","Partnership","Company","LLP"];
const statuses = ["Pending","In Progress","Filed","Overdue"];
const today = new Date();

// ==================== In-memory data (loaded from Firestore) ====================
let clients = [];
let filings = [];
let payments = [];
let employees = []; // team members with role "employee" -> {id: uid, name}
let currentUser = null; // { uid, role, name }

let state = { tab:"dashboard", clientSearch:"", filingFilterEmp:"all", filingFilterStatus:"all", selectedClient:null };

// ==================== Helpers ====================
function empName(id){ const e = employees.find(x=>x.id===id); return e ? e.name : "Unassigned"; }
function clientName(id){ const c = clients.find(x=>x.id===id); return c ? c.name : "Unknown"; }
function daysUntil(dateStr){ const t = new Date(dateStr); const now = new Date(); now.setHours(0,0,0,0); return Math.round((t-now)/(1000*60*60*24)); }
function addOneMonth(dateStr){ const t = new Date(dateStr); t.setMonth(t.getMonth()+1); return t.toISOString().slice(0,10); }
function addMonths(dateStr, months){ const t = new Date(dateStr); t.setMonth(t.getMonth()+months); return t.toISOString().slice(0,10); }
function intervalMonthsForType(type){
  if(type.indexOf("GST Return") === 0) return 1;
  if(type.indexOf("TDS Return") === 0) return 3;
  if(type === "Income Tax Return") return 12;
  if(type === "ROC Annual Filing") return 12;
  return 1;
}
function defaultFirstDueDate(type){
  const months = intervalMonthsForType(type);
  const daysAhead = months===1 ? 10 : months===3 ? 20 : 30;
  const t = new Date(today); t.setDate(t.getDate()+daysAhead);
  return t.toISOString().slice(0,10);
}
function otherGSTType(type){
  if(type === "GST Return (GSTR-1)") return "GST Return (GSTR-3B)";
  if(type === "GST Return (GSTR-3B)") return "GST Return (GSTR-1)";
  return null;
}
function urgency(f){
  if(f.status==="Filed") return {label:"Filed", cls:"u-green"};
  const diff = daysUntil(f.dueDate);
  if(diff<0) return {label:`${Math.abs(diff)}d overdue`, cls:"u-red"};
  if(diff<=3) return {label:`Due in ${diff}d`, cls:"u-amber"};
  return {label:`Due in ${diff}d`, cls:"u-muted"};
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function isEmployee(){ return currentUser && currentUser.role === "employee"; }
function isAdmin(){ return currentUser && currentUser.role === "admin"; }
function isValidPAN(pan){ return /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(pan); }
function isValidGSTIN(gstin){ return /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/.test(gstin); }

function visibleFilings(){ return isEmployee() ? filings.filter(f=>f.employeeId===currentUser.uid) : filings; }
function visibleClients(){
  if(isEmployee()){
    const myFilingIds = new Set(filings.filter(f=>f.employeeId===currentUser.uid).map(f=>f.clientId));
    return clients.filter(c => c.assignedEmployeeId===currentUser.uid || myFilingIds.has(c.id));
  }
  return clients;
}

// ==================== Auth ====================
document.getElementById("login-btn").addEventListener("click", async ()=>{
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  showLoginError("");
  try{
    await auth.signInWithEmailAndPassword(email, password);
    // onAuthStateChanged below will take over from here
  } catch(err){
    showLoginError(friendlyAuthError(err));
  }
});

document.getElementById("forgot-link").addEventListener("click", async ()=>{
  const email = document.getElementById("login-email").value.trim();
  if(!email){ showLoginError("Enter your email above first, then click Forgot password."); return; }
  try{
    await auth.sendPasswordResetEmail(email);
    showLoginNote("Password reset email sent — check your inbox.");
  } catch(err){
    showLoginError(friendlyAuthError(err));
  }
});

function friendlyAuthError(err){
  if(err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found"){
    return "Incorrect email or password.";
  }
  return err.message || "Something went wrong. Please try again.";
}
function showLoginError(msg){
  document.getElementById("login-error-slot").innerHTML = msg ? `<div class="login-error">${esc(msg)}</div>` : "";
}
function showLoginNote(msg){
  document.getElementById("login-error-slot").innerHTML = `<div class="login-note">${esc(msg)}</div>`;
}

auth.onAuthStateChanged(async (user)=>{
  if(user){
    try{
      const teamDoc = await db.collection("team").doc(user.uid).get();
      if(!teamDoc.exists){
        showLoginError("Account not set up. Your UID is: " + user.uid + " — this exact text must be the Document ID in Firestore 'team' collection.");
        await auth.signOut();
        return;
      }
      const data = teamDoc.data();
      currentUser = { uid: user.uid, role: data.role, name: data.name };
      await loadAllData();
      showApp();
    } catch(err){
      showLoginError("Could not load your account: " + err.message);
    }
  } else {
    currentUser = null;
    document.getElementById("login-root").style.display = "flex";
    document.getElementById("app").classList.remove("visible");
  }
});

function logout(){ auth.signOut(); }

// ==================== Data loading ====================
async function loadAllData(){
  // Team (for names + employee dropdown)
  const teamSnap = await db.collection("team").get();
  employees = teamSnap.docs
    .map(d=>({ id:d.id, name:d.data().name, role:d.data().role }))
    .filter(e=>e.role==="employee");

  // Clients — everyone signed in can read (see security-note in chat)
  const clientsSnap = await db.collection("clients").get();
  clients = clientsSnap.docs.map(d=>({ id:d.id, ...d.data() }));

  // Filings — admin gets all, employee gets only their own (matches security rules)
  let filingsSnap;
  if(isAdmin()){
    filingsSnap = await db.collection("filings").get();
  } else {
    filingsSnap = await db.collection("filings").where("employeeId","==",currentUser.uid).get();
  }
  filings = filingsSnap.docs.map(d=>({ id:d.id, ...d.data() }));

  // Payments — same pattern
  let paymentsSnap;
  if(isAdmin()){
    paymentsSnap = await db.collection("payments").get();
  } else {
    paymentsSnap = await db.collection("payments").where("employeeId","==",currentUser.uid).get();
  }
  payments = paymentsSnap.docs.map(d=>({ id:d.id, ...d.data() }));
}

async function refreshFilings(){
  let snap;
  if(isAdmin()) snap = await db.collection("filings").get();
  else snap = await db.collection("filings").where("employeeId","==",currentUser.uid).get();
  filings = snap.docs.map(d=>({ id:d.id, ...d.data() }));
}
async function refreshClients(){
  const snap = await db.collection("clients").get();
  clients = snap.docs.map(d=>({ id:d.id, ...d.data() }));
}
async function refreshPayments(){
  let snap;
  if(isAdmin()) snap = await db.collection("payments").get();
  else snap = await db.collection("payments").where("employeeId","==",currentUser.uid).get();
  payments = snap.docs.map(d=>({ id:d.id, ...d.data() }));
}

function showApp(){
  document.getElementById("login-root").style.display = "none";
  document.getElementById("app").classList.add("visible");
  render();
}

// ==================== Render ====================
function render(){ renderNav(); renderSidebarFoot(); renderMain(); }

function renderNav(){
  const overdueCount = visibleFilings().filter(f=>f.status!=="Filed" && daysUntil(f.dueDate)<0).length;
  const items = [{id:"dashboard",label:"Dashboard"},{id:"clients",label:"Clients"},{id:"filings",label:"Filings"+(overdueCount>0?` <span class="nav-badge">${overdueCount}</span>`:"")}];
  if(isAdmin()) items.push({id:"employees",label:"Employees"});
  document.getElementById("nav").innerHTML = items.map(it=>`
    <button class="nav-item ${state.tab===it.id?'active':''}" data-tab="${it.id}">${it.label}</button>
  `).join("");
  document.querySelectorAll(".nav-item").forEach(btn=>{
    btn.addEventListener("click", ()=>{ state.tab=btn.dataset.tab; state.selectedClient=null; render(); });
  });
}

function renderSidebarFoot(){
  document.getElementById("sidebar-foot").innerHTML = `
    <div class="user-chip">${esc(currentUser.name)}</div>
    <div class="user-role">${isAdmin()?"Administrator":"Employee account"}</div>
    <button class="logout-btn" id="change-password-btn" style="margin-bottom:6px">Change password</button>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  `;
  document.getElementById("change-password-btn").addEventListener("click", openChangePasswordModal);
  document.getElementById("logout-btn").addEventListener("click", logout);
}

function renderMain(){
  const main = document.getElementById("main");
  if(state.tab==="dashboard") main.innerHTML = dashboardHTML();
  else if(state.tab==="clients" && !state.selectedClient) main.innerHTML = clientsHTML();
  else if(state.tab==="clients" && state.selectedClient) main.innerHTML = clientDetailHTML();
  else if(state.tab==="filings") main.innerHTML = filingsHTML();
  else if(state.tab==="employees" && isAdmin()) main.innerHTML = employeesHTML();
  else { state.tab="dashboard"; main.innerHTML = dashboardHTML(); }
  bindMainEvents();
}

function dashboardHTML(){
  const myFilings = visibleFilings();
  const overdue = myFilings.filter(f=>f.status!=="Filed" && daysUntil(f.dueDate)<0).length;
  const pending = myFilings.filter(f=>f.status!=="Filed").length;
  const paymentPending = myFilings.filter(f=>f.paymentStatus==="Pending").reduce((s,f)=>s+(f.fee||0),0);
  const upcoming = [...myFilings].filter(f=>f.status!=="Filed").sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate)).slice(0,6);
  const empScope = isEmployee() ? [] : employees;
  const workload = empScope.map(e=>({
    ...e,
    count: filings.filter(f=>f.employeeId===e.id && f.status!=="Filed").length,
    overdue: filings.filter(f=>f.employeeId===e.id && f.status!=="Filed" && daysUntil(f.dueDate)<0).length,
    collected: payments.filter(p=>p.employeeId===e.id).reduce((s,p)=>s+(p.amount||0),0),
  }));
  const totalCollected = payments.reduce((s,p)=>s+(p.amount||0),0);

  return `
    <h1 class="page-title serif">Dashboard</h1>
    <p class="page-sub">${isEmployee()?"Your assigned clients and filings":"Overview across all clients and employees"}</p>
    <div class="stats-grid">
      <div class="card"><div class="stat-label">${isEmployee()?"Your Clients":"Total Clients"}</div><div class="stat-value serif">${visibleClients().length}</div></div>
      <div class="card"><div class="stat-label">Pending Filings</div><div class="stat-value serif tone-amber">${pending}</div></div>

// ==================== Event binding ====================
function bindMainEvents(){
  if(state.tab==="clients" && !state.selectedClient){
    const addBtn = document.getElementById("btn-add-client");
    if(addBtn) addBtn.addEventListener("click", openAddClientModal);
    const search = document.getElementById("client-search");
    search.addEventListener("input", (e)=>{ state.clientSearch = e.target.value; renderMain(); refocus("client-search"); });
    document.querySelectorAll("tr[data-client]").forEach(row=>row.addEventListener("click", ()=>{ state.selectedClient=row.dataset.client; render(); }));
  }
  if(state.tab==="clients" && state.selectedClient){
    document.getElementById("btn-back-clients").addEventListener("click", ()=>{ state.selectedClient=null; renderMain(); });
    const delBtn = document.getElementById("btn-delete-client");
    if(delBtn) delBtn.addEventListener("click", async ()=>{
      const c = clients.find(x=>x.id===state.selectedClient);
      if(!c) return;
      const confirmed = confirm(`Delete "${c.name}"? This will also delete all their filings and payment records. This cannot be undone.`);
      if(!confirmed) return;
      const clientFilings = filings.filter(f=>f.clientId===c.id);
      const clientPaymentsToDelete = payments.filter(p=>p.clientId===c.id);
      for(const f of clientFilings) await db.collection("filings").doc(f.id).delete();
      for(const p of clientPaymentsToDelete) await db.collection("payments").doc(p.id).delete();
      await db.collection("clients").doc(c.id).delete();
      await refreshClients(); await refreshFilings(); await refreshPayments();
      state.selectedClient = null;
      renderMain();
    });
    const logPayBtn = document.getElementById("btn-log-payment-client");
    if(logPayBtn) logPayBtn.addEventListener("click", ()=>openLogPaymentModal(state.selectedClient));
  }
  if(state.tab==="filings"){
    const addBtn = document.getElementById("btn-add-filing");
    if(addBtn) addBtn.addEventListener("click", openAddFilingModal);
    document.getElementById("btn-export-csv").addEventListener("click", exportFilingsCSV);
    const filterEmp = document.getElementById("filter-emp");
    if(filterEmp) filterEmp.addEventListener("change", (e)=>{ state.filingFilterEmp = e.target.value; renderMain(); });
    document.getElementById("filter-status").addEventListener("change", (e)=>{ state.filingFilterStatus = e.target.value; renderMain(); });
    document.querySelectorAll(".reassign-select").forEach(sel=>sel.addEventListener("change", async (e)=>{
      await db.collection("filings").doc(sel.dataset.filing).update({ employeeId: e.target.value });
      await refreshFilings(); renderMain();
    }));
    document.querySelectorAll(".status-select").forEach(sel=>sel.addEventListener("change", async (e)=>{
      const f = filings.find(x=>x.id===sel.dataset.filing);
      const newStatus = e.target.value;
      const wasNotFiled = f.status !== "Filed";
      await db.collection("filings").doc(f.id).update({ status: newStatus });
      if(wasNotFiled && newStatus === "Filed" && f.recurring){
        const nextDue = addMonths(f.dueDate, intervalMonthsForType(f.type));
        await db.collection("filings").add({
          clientId: f.clientId, type: f.type, dueDate: nextDue,
          status: daysUntil(nextDue) < 0 ? "Overdue" : "Pending",
          employeeId: f.employeeId, recurring: true, fee: f.fee||0, paymentStatus: "Pending",
        });
        // GST cross-link: if this client subscribes to the paired GST return type,
        // and it doesn't currently have a pending/in-progress entry, create one.
        const pairType = otherGSTType(f.type);
        if(pairType){
          const client = clients.find(c=>c.id===f.clientId);
          const subscribed = client && client.filingSubscriptions && client.filingSubscriptions.includes(pairType);
          const alreadyOpen = filings.some(x=>x.clientId===f.clientId && x.type===pairType && x.status!=="Filed");
          if(subscribed && !alreadyOpen){
            await db.collection("filings").add({
              clientId: f.clientId, type: pairType, dueDate: f.dueDate,
              status: daysUntil(f.dueDate) < 0 ? "Overdue" : "Pending",
              employeeId: f.employeeId, recurring: true, fee: 0, paymentStatus: "Pending",
            });
          }
        }
      }
      await refreshFilings(); renderMain();
    }));
    document.querySelectorAll(".payment-select").forEach(sel=>sel.addEventListener("change", async (e)=>{
      await db.collection("filings").doc(sel.dataset.filing).update({ paymentStatus: e.target.value });
      await refreshFilings(); renderMain();
    }));
  }
}

function openChangePasswordModal(){
  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" id="overlay"><div class="modal-box">
      <div class="modal-head"><h3 class="serif">Change password</h3><button class="modal-close" id="close-modal">✕</button></div>
      <div class="modal-body">
        <div id="cp-error-slot"></div>
        <div class="field"><label>Current password</label><input type="password" id="cp-current" /></div>
        <div class="field"><label>New password (min 6 characters)</label><input type="password" id="cp-new" /></div>
        <div class="field"><label>Confirm new password</label><input type="password" id="cp-confirm" /></div>
        <button class="btn-primary" id="save-password" style="width:100%;justify-content:center;margin-top:8px">Update password</button>
      </div>
    </div></div>`;
  document.getElementById("close-modal").addEventListener("click", closeModal);
  document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });
  document.getElementById("save-password").addEventListener("click", async ()=>{
    const currentPw = document.getElementById("cp-current").value;
    const newPw = document.getElementById("cp-new").value;
    const confirmPw = document.getElementById("cp-confirm").value;
    const errSlot = document.getElementById("cp-error-slot");
    errSlot.innerHTML = "";
    if(newPw.length < 6){ errSlot.innerHTML = `<div class="login-error">New password must be at least 6 characters.</div>`; return; }
    if(newPw !== confirmPw){ errSlot.innerHTML = `<div class="login-error">New passwords don't match.</div>`; return; }
    try{
      const user = auth.currentUser;
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPw);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPw);
      errSlot.innerHTML = `<div class="login-note">Password updated successfully.</div>`;
      setTimeout(closeModal, 1500);
    } catch(err){
      errSlot.innerHTML = `<div class="login-error">${esc(err.code==="auth/wrong-password"||err.code==="auth/invalid-credential" ? "Current password is incorrect." : err.message)}</div>`;
    }
  });
}


function exportFilingsCSV(){
  const scoped = visibleFilings();
  const rows = [["Client","Filing Type","Due Date","Assigned To","Status","Fee","Payment Status"]];
  scoped.forEach(f=>{
    rows.push([clientName(f.clientId), f.type, f.dueDate, empName(f.employeeId), f.status, f.fee||0, f.paymentStatus||"Pending"]);
  });
  const csvContent = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "filings_export_" + today.toISOString().slice(0,10) + ".csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

          <p class="cell-muted" style="font-size:11px;margin-top:6px">First pending filing for each selected type will be created automatically, on the right schedule.</p>
        </div>
        <div class="field"><label>Notes (optional)</label><textarea id="f-notes" rows="3" placeholder="e.g. Prefers WhatsApp reminders, pays late" style="width:100%;border:1px solid var(--input-border);border-radius:6px;padding:8px 10px;font-size:14px;font-family:inherit;resize:vertical"></textarea></div>
        <button class="btn-primary" id="save-client" style="width:100%;justify-content:center;margin-top:8px">Save client</button>
      </div>
    </div></div>`;
  document.getElementById("close-modal").addEventListener("click", closeModal);
  document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });
  document.getElementById("f-pan").addEventListener("input", e=>{ e.target.value=e.target.value.toUpperCase(); document.getElementById("pan-error").textContent=""; });
  document.getElementById("f-gstin").addEventListener("input", e=>{ e.target.value=e.target.value.toUpperCase(); document.getElementById("gstin-error").textContent=""; });
  document.getElementById("save-client").addEventListener("click", async ()=>{
    const name = document.getElementById("f-name").value.trim();
    const companyName = document.getElementById("f-company").value.trim();
    const otherCompaniesRaw = document.getElementById("f-other-companies").value.trim();
    const otherCompanies = otherCompaniesRaw ? otherCompaniesRaw.split(",").map(s=>s.trim()).filter(Boolean) : [];
    const phone = document.getElementById("f-phone").value.trim();
    const pan = document.getElementById("f-pan").value.trim();
    const gstin = document.getElementById("f-gstin").value.trim();
    const type = document.getElementById("f-type").value;
    const notes = document.getElementById("f-notes").value.trim();
    const assignedEmployeeId = document.getElementById("f-assigned-emp").value;
    const filingSubscriptions = Array.from(document.querySelectorAll(".f-subscription:checked")).map(el=>el.value);
    if(!name){ return; }
    if(!pan || !isValidPAN(pan)){
      document.getElementById("pan-error").textContent = "Enter a valid 10-character PAN (e.g. ABCDE1234F)";
      return;
    }
    if(gstin && !isValidGSTIN(gstin)){
      document.getElementById("gstin-error").textContent = "Enter a valid 15-character GSTIN, or leave blank";
      return;
    }
    const clientRef = await db.collection("clients").add({
      name, companyName: companyName||"", otherCompanies, phone: phone||"",
      pan, gstin: gstin||"-", type, status:"Active", notes: notes||"", assignedEmployeeId: assignedEmployeeId||"",
      filingSubscriptions
    });
    for(const ftype of filingSubscriptions){
      const dueDate = defaultFirstDueDate(ftype);
      await db.collection("filings").add({
        clientId: clientRef.id, type: ftype, dueDate,
        status: daysUntil(dueDate) < 0 ? "Overdue" : "Pending",
        employeeId: assignedEmployeeId||"", recurring: true, fee: 0, paymentStatus: "Pending"
      });
    }
    await refreshClients();
    await refreshFilings();
    closeModal(); renderMain();
  });
}

function openAddFilingModal(){
  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" id="overlay"><div class="modal-box">
      <div class="modal-head"><h3 class="serif">Add filing</h3><button class="modal-close" id="close-modal">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>Client</label><select id="f-client">${clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}</select></div>
        <div class="field"><label>Filing type</label><select id="f-ftype">${filingTypes.map(t=>`<option value="${t}">${t}</option>`).join("")}</select></div>
        <div class="field"><label>Due date</label><input type="date" id="f-due" value="${today.toISOString().slice(0,10)}" /></div>
        <div class="field"><label>Fee amount (₹)</label><input type="number" id="f-fee" placeholder="e.g. 1500" /></div>
        <div class="field"><label>Payment status</label><select id="f-payment"><option value="Pending">Pending</option><option value="Paid">Paid</option></select></div>
        <div class="field"><label>Assign to</label><select id="f-emp">${employees.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join("")}</select></div>
        <div class="field" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="f-recurring" style="width:auto" /><label style="margin:0" for="f-recurring">Repeat automatically (based on filing type's schedule)</label></div>
        <button class="btn-primary" id="save-filing" style="width:100%;justify-content:center;margin-top:8px">Save filing</button>
      </div>
    </div></div>`;
  document.getElementById("close-modal").addEventListener("click", closeModal);
  document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });
  document.getElementById("save-filing").addEventListener("click", async ()=>{
    const clientId = document.getElementById("f-client").value;
    const type = document.getElementById("f-ftype").value;
    const dueDate = document.getElementById("f-due").value;
    const employeeId = document.getElementById("f-emp").value;
    const recurring = document.getElementById("f-recurring").checked;
    const fee = parseFloat(document.getElementById("f-fee").value) || 0;
    const paymentStatus = document.getElementById("f-payment").value;
    const status = daysUntil(dueDate) < 0 ? "Overdue" : "Pending";
    await db.collection("filings").add({ clientId, type, dueDate, employeeId, status, recurring, fee, paymentStatus });
    await refreshFilings();
    closeModal(); renderMain();
  });
}

function openLogPaymentModal(fixedClientId){
  const client = clients.find(c=>c.id===fixedClientId);
  const clientFieldHTML = client
    ? `<div class="field"><label>Client</label><input value="${esc(client.name)}" disabled /></div>`
    : `<div class="field"><label>Client</label><select id="p-client">${visibleClients().map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}</select></div>`;
  const employeeFieldHTML = isEmployee()
    ? `<div class="field"><label>Collected by</label><input value="${esc(currentUser.name)}" disabled /></div>`
    : `<div class="field"><label>Collected by</label><select id="p-emp">${employees.map(e=>`<option value="${e.id}" ${client && client.assignedEmployeeId===e.id?'selected':''}>${esc(e.name)}</option>`).join("")}</select></div>`;
  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" id="overlay"><div class="modal-box">
      <div class="modal-head"><h3 class="serif">Log payment</h3><button class="modal-close" id="close-modal">✕</button></div>
      <div class="modal-body">
        ${clientFieldHTML}
        <div class="field"><label>Amount (₹)</label><input type="number" id="p-amount" placeholder="e.g. 1500" /></div>
        <div class="field"><label>Date</label><input type="date" id="p-date" value="${today.toISOString().slice(0,10)}" /></div>
        ${employeeFieldHTML}
        <div class="field"><label>Note (optional)</label><input id="p-note" placeholder="e.g. GST filing fee" /></div>
        <button class="btn-primary" id="save-payment" style="width:100%;justify-content:center;margin-top:8px">Save payment</button>
      </div>
    </div></div>`;
  document.getElementById("close-modal").addEventListener("click", closeModal);
  document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });
  document.getElementById("save-payment").addEventListener("click", async ()=>{
    const clientId = fixedClientId || document.getElementById("p-client").value;
    const amount = parseFloat(document.getElementById("p-amount").value) || 0;
    const date = document.getElementById("p-date").value;
    const note = document.getElementById("p-note").value.trim();
    const employeeId = isEmployee() ? currentUser.uid : document.getElementById("p-emp").value;
    if(!clientId || amount<=0) return;
    await db.collection("payments").add({ clientId, employeeId, amount, date, note });
    await refreshPayments();
    closeModal(); renderMain();
  });
}
</script>
